<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Online Library</title>
</head>
<body>
    <h1>Get Started</h1>
    <form action="signup-action.php" method="POST">
        <label for="First Name">First Name</label>
        <input type="text" id="first-name" name="first-name" required>
        <label for="Last Name">Last Name</label> 
        <input type="text" id="last-name" name="last-name" required>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="role-user">User</label>
        <input type="radio" id="role-user" name="role" value="user" checked>
        
        <label for="role-admin">Admin</label>
        <input type="radio" id="role-admin" name="role" value="admin">

        <button type="Create Account">Create Account</button>
    
    </form>
    <p>Already have an account? <a href="login.html">Login here</a></p>
</body>
</html>
