     <nav>  <a href="Add_Book.html">Add Book</a> |

    <h1> Add your book </h1>
    <hr>
  
    
    <h2> Please enter your  specifications of the book . </h2>

    <form>

        <div>
            <label for="num">Book ID :</label>
            <input type="number" id="num" name="Book_ID" required>
        </div>
        <hr>

         <div>
            <label for="name">Book Name :</label>
            <input type="text" id="name" name="Book_Name" required>
        </div>
        <hr>
           <div>
            <label for="auth">Author :</label>
            <input type="text" id="auth" name="Author_Name" required>
        </div>
        <hr>
        <div>
            <label for="cat" > Category :</label>
            <input list="Category" id="cat" name="category" required>
             <datalist id="Category">
             <option value="Programming">
             <option value="Math">
             <option value="Physics">
             <option value="History">
             <option value="Medicine">


            </datalist>
            
        </div>
        <hr>

        <div>
            <label for="desc">Description:</label>
            <br>
            <textarea id="desc" name="description" rows="4" cols="40"></textarea>
            <hr>



        </div>
            <input type="submit" value="Add">













    </form>



    
</body>
</html>
