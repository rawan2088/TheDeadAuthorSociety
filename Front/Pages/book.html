<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Details</title>
    <link rel="stylesheet" href="../CSS/main.css" />
  </head>
  <body>
    <div id="navbar"></div>

    <main>
      <h1>Book Details</h1>
      <img id="bookImg" src="" height="500" width="400" alt="" />
      <strong>Title: </strong>
      <p id="bookTitle"></p>
      <strong>Author: </strong>
      <p id="bookAuthor"></p>
      <strong>Published: </strong>
      <p id="bookPublishedDate"></p>
      <strong>Category: </strong>
      <p id="bookCategory"></p>
      <strong>Status: </strong>
      <p id="bookStatus"></p>
      <strong>Description: </strong>
      <p id="bookDescription"></p>
      <button id="borrowBtn">Borrow</button>

      <!-- ─── Comments Section ───────────────────────────── -->
      <section id="commentsSection">
        <h2>Comments</h2>

        <div id="commentForm">
          <select id="commentRating">
            <option value="5">⭐⭐⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="2">⭐⭐</option>
            <option value="1">⭐</option>
          </select>
          <textarea
            id="commentContent"
            placeholder="Write your comment..."
          ></textarea>
          <button id="submitCommentBtn">Submit Comment</button>
          <p id="commentMsg"></p>
        </div>

        <div id="commentsList"></div>
      </section>
    </main>

    <footer>
      <a href="About.html">About Us</a> |
      <a href="Contact.html">Contact Us</a>
      <p>&copy; Library Management System. All rights reserved.</p>
    </footer>

    <script src="../js/storage.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/BookDetails.js"></script>
