<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Books — TheDeadAuthorSociety</title>
    <link rel="stylesheet" href="../CSS/main.css" />
    <link rel="stylesheet" href="../CSS/pages/SearchPage_Style.css" />
  </head>
  <body>
    <div id="navbar"></div>

    <main>
      <h1 class="page-title">Search Books</h1>
      <p class="page-subtitle">
        Press
        <kbd
          style="
            background: rgba(201, 168, 76, 0.12);
            border: 1px solid rgba(201, 168, 76, 0.3);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.8em;
          "
          >/</kbd
        >
        to jump to the search field
      </p>

      <div class="search-controls">
        <div class="control-group" style="flex: 2; min-width: 220px">
          <label for="searchInput">Search</label>
          <input
            type="text"
            id="searchInput"
            placeholder="Title, author, or keyword…"
            autocomplete="off"
          />
        </div>

        <div class="control-group">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="all">All Categories</option>
          </select>
        </div>

        <div class="control-group">
          <label for="availFilter">Availability</label>
          <select id="availFilter">
            <option value="all">All</option>
            <option value="in stock">In Stock</option>
            <option value="not available">Not Available</option>
          </select>
        </div>

        <button class="search-btn" id="clearBtn">Clear Filters</button>
      </div>

      <div class="results-info">
        <span class="results-count" id="resultCount">
          Showing <span id="visibleCount">0</span> of
          <span id="totalCount">0</span> books
        </span>
      </div>

      <div class="books-table-wrap">
        <table class="books-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Author</th>
              <th>Year</th>
              <th>Category</th>
              <th>Description</th>
              <th>Status</th>
              <th>Options</th>
            </tr>
          </thead>
          <tbody id="booksTableBody"></tbody>
        </table>
      </div>

      <div class="no-results" id="noResults">
        <div class="no-results-icon">📚</div>
        <h3>No books found</h3>
        <p>Try a different search term or clear the filters.</p>
      </div>
    </main>

    <footer>
      <a href="About.html">About Us</a> |
      <a href="Contact.html">Contact Us</a>
      <p>&copy; TheDeadAuthorSociety Library. All rights reserved.</p>
    </footer>

    <script src="../js/storage.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/SearchPage_Script.js" defer></script>
  </body>
</html>
