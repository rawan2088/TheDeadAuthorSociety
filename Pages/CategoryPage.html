<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categories — TheDeadAuthorSociety</title>
    <link rel="stylesheet" href="../CSS/main.css" />
    <link rel="stylesheet" href="../CSS/pages/CategoryPage_Style.css" />
  </head>
  <body>
    <div id="navbar"></div>

    <main>
      <h1 class="page-title">Browse by Category</h1>
      <p class="page-subtitle">
        Explore our collection grouped by genre and literary style
      </p>

      <div class="filter-bar" id="filterBar">
        <button class="filter-tab active" data-filter="all">All Genres</button>
        <button
          id="expandCollapseBtn"
          style="
            margin-left: auto;
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-cream-dim);
            border-radius: 20px;
            padding: 6px 18px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
          "
          onmouseover="
            this.style.borderColor = 'var(--color-gold)';
            this.style.color = 'var(--color-gold)';
          "
          onmouseout="
            this.style.borderColor = 'var(--color-border)';
            this.style.color = 'var(--color-cream-dim)';
          "
        >
          Expand All
        </button>
      </div>

      <div id="categoriesContainer"></div>
    </main>

    <footer>
      <a href="About.html">About Us</a> |
      <a href="Contact.html">Contact Us</a>
      <p>&copy; TheDeadAuthorSociety Library. All rights reserved.</p>
    </footer>

    <script src="../js/storage.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/CategoryPage_Script.js" defer></script>
  </body>
</html>
