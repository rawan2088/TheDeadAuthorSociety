<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup - Online Library</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/pages/Sign_Up.css" />
  </head>
  <body>
  <div id="navbar"></div>
    <br />
    <p id="signupError" style="color: red;"></p>
    <form id="signupForm">
      <label for="First Name">First Name</label>
      <input type="text" id="first-name" name="first-name" required />
      <label for="Last Name">Last Name</label>
      <input type="text" id="last-name" name="last-name" required />
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required />

      <label for="confirm-password">Confirm Password</label>
      <input
        type="password"
        id="confirm-password"
        name="confirm-password"
        required
      />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />

      <label for="role-user">User</label>
      <input type="radio" id="role-user" name="role" value="user" checked />

      <label for="role-admin">Admin</label>
      <input type="radio" id="role-admin" name="role" value="admin" />

      <button type="submit">Create Account</button>
    </form>

    <p>Already have an account? <a href="login.html">Login here</a></p>
    <footer>
      <a href="About.html">About Us</a> |
      <a href="Contact.html">Contact Us</a>
      <p>&copy; Library Management System. All rights reserved.</p>
    </footer>
    <script src="../js/storage.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/Signup.js"></script>
  </body>
</html>
