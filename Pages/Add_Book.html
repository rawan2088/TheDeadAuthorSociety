<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add book</title>
    <link rel="stylesheet" href="../CSS/main.css" />
    <link rel="stylesheet" href="../CSS/pages/Add_Book_Style.css" />
  </head>

  <body>
    <div id="navbar"></div>

    <h1>Add A new book</h1>
    <hr />

    <h2>Please enter your specifications of the book .</h2>

    <form>
      <div>
        <label for="num">Book ID :</label>
        <input type="number" id="num" name="Book_ID" required />
      </div>
      <!-- <hr /> -->

      <div>
        <label for="name">Book Name :</label>
        <input type="text" id="name" name="Book_Name" required />
      </div>
      <!-- <hr /> -->
      <div>
        <label for="auth">Author :</label>
        <input type="text" id="auth" name="Author_Name" required />
      </div>
      <!-- <hr /> -->
      <div>
        <label for="cat"> Category :</label>
        <input
          list="Category"
          id="cat"
          name="category"
          required
          placeholder="e.g. Mystery Thriller"
        />
        <datalist id="Category">
          <option value="Classic Fiction"></option>
          <option value="Southern Gothic"></option>
          <option value="Young Adult"></option>
          <option value="Mystery Thriller"></option>
          <option value="Romance"></option>
          <option value="Classical Romance"></option>
          <option value="Self Help"></option>
          <option value="Historical Fiction"></option>
          <option value="Bildungsroman"></option>
        </datalist>
      </div>
      <!-- <hr /> -->

      <div>
        <label for="desc">Description:</label>
        <br />
        <textarea id="desc" name="description" rows="4" cols="40"></textarea>
        <hr />
      </div>
      <input type="submit" value="Add" />
    </form>

    <hr />
    <footer>
      <a href="About.html">About Us</a> |
      <a href="Contact.html">Contact Us</a>
      <p>&copy; Library Management System. All rights reserved.</p>
    </footer>
    <script src="../js/storage.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/Add_Book_Script.js" defer></script>
  </body>
</html>
