  </head>

  <body>
    <header>
      <h1 id="mainLogo">TheDeadAuthorSociety</h1>

      <nav>
        <a href="About.html">About Us</a> |

        <!-- if user is admin, show add new book btn -->
      </nav>
    </header>

    <hr />

    <h1>Add your book</h1>
    <hr />

    <h2>Please enter your specifications of the book .</h2>

    <form>
      <div>
        <label for="num">Book ID :</label>
        <input type="number" id="num" name="Book_ID" required />
      </div>
      <hr />

      <div>
        <label for="name">Book Name :</label>
        <input type="text" id="name" name="Book_Name" required />
      </div>
      <hr />
      <div>
        <label for="auth">Author :</label>
        <input type="text" id="auth" name="Author_Name" required />
      </div>
      <hr />
      <div>
        <label for="cat"> Category :</label>
        <input list="Category" id="cat" name="category" required />
        <datalist id="Category">
          <option value="Programming"></option>
          <option value="Math"></option>
          <option value="Physics"></option>
          <option value="History"></option>
          <option value="Medicine"></option>
        </datalist>
      </div>
      <hr />

      <div>
        <label for="desc">Description:</label>
        <br />
        <textarea id="desc" name="description" rows="4" cols="40"></textarea>
        <hr />
      </div>
      <input type="submit" value="Add" />
    </form>

    <hr />
    <footer>
      <a href="About.html">About Us</a> |
      <a href="Contact.html">Contact Us</a>

    </footer>

</html>
