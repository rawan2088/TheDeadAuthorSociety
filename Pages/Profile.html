<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profile</title>
    <link rel="stylesheet" href="../CSS/main.css" />
    <link rel="stylesheet" href="../CSS/pages/profile_Style.css" />
  </head>

  <body>
    <div id="navbar"></div>

    <main>
      <h1>My Profile</h1>
      <hr />

      <section style="margin-bottom: 1.5rem">
        <p><strong>Role:</strong> <span id="displayRole">—</span></p>
        <p><strong>Username:</strong> <span id="displayUsername">—</span></p>
        <p><strong>Email:</strong> <span id="displayEmail">—</span></p>
      </section>

      <hr />

      <form>
        <div>
          <label for="user">New Username:</label>
          <input
            type="text"
            id="user"
            name="new_name"
            placeholder="Leave blank to keep current"
          />
        </div>
        <hr />

        <div>
          <label for="email">New Email:</label>
          <input
            type="email"
            id="email"
            name="newemail"
            placeholder="Leave blank to keep current"
          />
        </div>
        <hr />

        <div>
          <label for="Cpass"><strong>Current Password:</strong></label>
          <input
            type="password"
            id="Cpass"
            placeholder="Required to change password"
          />

          <label for="pass"><strong>New Password:</strong></label>
          <input
            type="password"
            id="pass"
            name="new_password"
            placeholder="At least 6 characters"
          />
        </div>
        <hr />

        <input type="submit" value="Save Changes" class="btn btn-primary" />
      </form>
    </main>

    <footer>
      <a href="About.html">About Us</a> |
      <a href="Contact.html">Contact Us</a>
      <p>&copy; Library Management System. All rights reserved.</p>
    </footer>

    <script src="../js/storage.js"></script>
    <script src="../js/navbar.js"></script>
    <script defer src="../js/profile_script.js"></script>
  </body>
</html>
